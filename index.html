<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AAnow💸</title>
<meta name="description" content="AAnow - 聚餐AA，3秒建群，自动算账。多人分账工具，一键结算。">
<meta property="og:title" content="AAnow💸 一键分账">

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg:#0d0d0d; --card:#181818; --card2:#1f1f1f;
  --accent:#f0e040; --accent2:#ff6b35;
  --text:#f0ece0; --muted:#555; --border:#2a2a2a;
  --green:#4ade80; --radius:16px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans SC',sans-serif; min-height:100vh; padding-bottom:100px; overflow-x:hidden; }

.header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; }
.title { font-family:'Syne',sans-serif; font-size:38px; font-weight:800; line-height:1; display:flex; align-items:baseline; }
.title .a { color:var(--accent); display:inline-block; }
.title .a.pop { animation:popA .3s cubic-bezier(.34,1.56,.64,1); }
.title .now { color:var(--text); }
.title-deco { font-size:38px; opacity:.45; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
@keyframes popA { from{opacity:0;transform:scale(.4) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }

.page { display:none; } .page.active { display:block; }
.section { padding:0 16px; margin-bottom:14px; }
.sec-title { font-family:'Syne',sans-serif; font-size:10px; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.badge { display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:var(--accent2); color:#fff; font-size:10px; font-weight:700; }

.inp { background:var(--card); border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; color:var(--text); font-size:15px; font-family:'Noto Sans SC',sans-serif; outline:none; transition:border-color .2s; width:100%; }
.inp:focus { border-color:var(--accent); }
.inp::placeholder { color:var(--muted); }
.inp.ro { opacity:.6; }

.btn { background:var(--accent); border:none; border-radius:12px; padding:13px 18px; color:#000; font-size:15px; font-weight:700; cursor:pointer; font-family:'Syne',sans-serif; white-space:nowrap; transition:transform .12s; }
.btn:active { transform:scale(.96); }
.btn.sec { background:var(--card2); color:var(--text); border:1.5px solid var(--border); }
.btn.full { width:100%; padding:16px; font-size:16px; border-radius:var(--radius); }
.btn.sm { padding:8px 14px; font-size:13px; border-radius:10px; }

.card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
.card h3 { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; margin-bottom:14px; color:var(--accent); }
.fg { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.fl { font-size:10px; color:var(--muted); letter-spacing:1px; }
.or { text-align:center; color:var(--muted); font-size:13px; margin:14px 0; position:relative; }
.or::before,.or::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
.or::before { left:0; } .or::after { right:0; }


.session-banner { display:none; background:rgba(240,224,64,.07); border:1.5px solid rgba(240,224,64,.2); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; align-items:center; justify-content:space-between; gap:12px; }
.sb-label { font-size:10px; color:var(--muted); letter-spacing:1px; margin-bottom:4px; }
.sb-info { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:var(--accent); }

.room-bar { background:var(--card2); border-bottom:1px solid var(--border); padding:9px 16px; display:flex; align-items:center; justify-content:space-between; }
.room-code { font-family:'Syne',sans-serif; font-size:13px; color:var(--accent); font-weight:700; letter-spacing:2px; }
.room-user { font-size:12px; color:var(--muted); }
.copy-btn { font-size:12px; color:var(--accent2); background:none; border:none; cursor:pointer; font-family:'Noto Sans SC',sans-serif; padding:4px 8px; }
.live { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; margin-right:5px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.chip { display:flex; align-items:center; gap:5px; background:var(--card); border:1.5px solid var(--border); border-radius:100px; padding:5px 10px 5px 8px; font-size:13px; animation:popIn .2s cubic-bezier(.34,1.56,.64,1); }
.chip.me { border-color:var(--accent); background:rgba(240,224,64,.06); }
.chip.hostchip { border-color:rgba(255,107,53,.4); }
.av { width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
.chip-rm { width:16px; height:16px; border-radius:50%; background:var(--border); border:none; color:var(--muted); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; margin-left:2px; flex-shrink:0; }
.chip-rm:active { background:var(--accent2); color:#fff; }
.add-row { display:flex; gap:8px; }
.toggle-manual { font-size:12px; color:var(--muted); background:none; border:none; cursor:pointer; margin-top:5px; font-family:'Noto Sans SC',sans-serif; }
@keyframes popIn { from{opacity:0;transform:scale(.9) translateY(4px)} to{opacity:1;transform:scale(1) translateY(0)} }

.ic { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; position:relative; }
.ic.mine { border-color:rgba(240,224,64,.22); }
.ic-who { font-size:10px; color:var(--muted); margin-bottom:8px; letter-spacing:.5px; }
.ic-who b { color:var(--accent2); font-weight:600; }
.ic-row { display:flex; gap:10px; margin-bottom:12px; align-items:flex-end; }
.pw { position:relative; }
.px { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }
.pw .inp { padding-left:24px; width:110px; }
.ic-rm { position:absolute; top:10px; right:10px; background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; line-height:1; padding:4px; }

.pill-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.pill-lbl { font-size:11px; color:var(--muted); display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
.all-btn { font-size:11px; color:var(--accent2); background:none; border:none; cursor:pointer; font-family:'Noto Sans SC',sans-serif; }

.pe { padding:6px 12px; border-radius:100px; border:1.5px solid var(--border); font-size:13px; cursor:pointer; display:flex; align-items:center; gap:4px; background:var(--card2); color:var(--muted); user-select:none; transition:all .12s; min-height:34px; }
.pe.on { border-color:var(--accent); color:var(--accent); background:rgba(240,224,64,.08); }
.pe.ro { cursor:default; opacity:.5; }
.pe .d { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; }
.pe.on .d { background:var(--accent); }

.pp { padding:6px 12px; border-radius:100px; border:1.5px solid var(--border); font-size:13px; cursor:pointer; display:flex; align-items:center; gap:4px; background:var(--card2); color:var(--muted); user-select:none; transition:all .12s; min-height:34px; }
.pp.on { border-color:var(--accent2); color:var(--accent2); background:rgba(255,107,53,.08); }
.pp .d { width:6px; height:6px; border-radius:50%; background:var(--border); flex-shrink:0; }
.pp.on .d { background:var(--accent2); }

.div { height:1px; background:var(--border); margin:10px 0; }

/* PERSONAL BILL MODAL */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; align-items:flex-end; }
.modal-bg.show { display:flex; }
.modal { background:var(--card); border-radius:20px 20px 0 0; padding:20px; width:100%; max-height:80vh; overflow-y:auto; }
.modal-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; margin-bottom:4px; }
.modal-sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
.modal-person-btn { padding:10px 14px; background:var(--card2); border:1.5px solid var(--border); border-radius:12px; color:var(--text); font-size:14px; cursor:pointer; display:flex; align-items:center; gap:10px; margin-bottom:8px; width:100%; text-align:left; font-family:'Noto Sans SC',sans-serif; }
.modal-person-btn:active { border-color:var(--accent); }
.modal-person-btn .av { width:28px; height:28px; font-size:13px; }
.modal-close { width:100%; padding:12px; background:none; border:1.5px solid var(--border); border-radius:12px; color:var(--muted); font-size:14px; cursor:pointer; margin-top:4px; font-family:'Noto Sans SC',sans-serif; }

/* PERSONAL BILL VIEW */
.personal-bill { background:var(--card); border:1.5px solid var(--accent); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
.pb-head { background:var(--accent); padding:14px 18px; }
.pb-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#000; }
.pb-total-label { font-size:11px; color:#000; opacity:.6; margin-top:2px; }
.pb-total { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:#000; }
.pb-body { padding:12px 18px; }
.pb-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
.pb-row:last-child { border-bottom:none; }
.pb-item-name { color:var(--text); }
.pb-item-amt { font-family:'Syne',sans-serif; font-weight:700; color:var(--accent); }
.pb-note { font-size:11px; color:var(--muted); margin-top:2px; }
.pb-footer { padding:12px 18px; border-top:1px solid var(--border); }
.back-btn { font-size:13px; color:var(--muted); background:none; border:none; cursor:pointer; font-family:'Noto Sans SC',sans-serif; }

.res-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:12px; }
.res-head { background:var(--accent); padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
.res-ht { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; color:#000; }
.res-total { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#000; }
.res-body { padding:4px 18px 8px; }
.res-row { padding:11px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.res-row:last-child { border-bottom:none; }
.res-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.res-left { display:flex; align-items:center; gap:10px; }
.res-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
.res-name { font-size:15px; font-weight:500; }
.res-amt { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; }
.res-bd { padding-left:40px; display:flex; flex-wrap:wrap; gap:5px; }
.bd-item { font-size:11px; color:var(--muted); background:var(--card2); border-radius:6px; padding:3px 8px; }
.res-hint { font-size:10px; color:var(--muted); padding-left:40px; margin-top:3px; }

.tr-card { background:var(--card); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 18px; margin-bottom:12px; }
.tr-title { font-family:'Syne',sans-serif; font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
.tr-row { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--card2); border-radius:10px; margin-bottom:6px; font-size:14px; }
.tr-arr { color:var(--accent2); font-size:15px; flex-shrink:0; }
.tr-amt { margin-left:auto; font-family:'Syne',sans-serif; font-weight:700; color:var(--accent); }

.shot { background:#111; border:1.5px solid var(--accent); border-radius:var(--radius); overflow:hidden; }
.shot-top { background:#000; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
.shot-save-btn { background:var(--accent); color:#000; border:none; border-radius:8px; padding:5px 12px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Noto Sans SC',sans-serif; }
.shot-save-btn:active { transform:scale(.95); }
.shot-body { padding:12px 16px; }
.shot-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:var(--muted); }
.shot-row.hi { color:var(--text); font-weight:500; }
.shot-row.tx { color:var(--accent); }
.shot-foot { background:var(--accent); padding:11px 16px; text-align:center; font-size:11px; color:#000; font-weight:700; letter-spacing:1.5px; font-family:'Syne',sans-serif; }

.empty { text-align:center; padding:28px 20px; color:var(--muted); font-size:14px; }
.empty-icon { font-size:34px; margin-bottom:8px; }
@keyframes fadeSlide { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:#000; padding:11px 22px; border-radius:100px; font-size:14px; font-weight:600; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
.bottom { position:fixed; bottom:0; left:0; right:0; padding:12px 16px 16px; background:linear-gradient(transparent,var(--bg) 50%); display:flex; gap:10px; z-index:90; }
</style>
</head>
<body>

<div class="header">
  <div class="title" id="main-title">
    <span class="a">A</span><span class="a">A</span><span class="now">now</span>
  </div>
  <div class="title-deco">💸</div>
</div>

<!-- LANDING -->
<div class="page active" id="pg-land">
  <div class="section" style="margin-top:8px">
    <div class="session-banner" id="session-banner">
      <div>
        <div class="sb-label">上次的房间</div>

      </div>

    <div class="card">

<!-- ROOM -->
<div class="page" id="pg-room">
  <div id="conn-bar" style="display:none;background:#ef4444;color:#fff;font-size:13px;font-weight:600;padding:8px 16px;align-items:center;justify-content:center;gap:8px;font-family:'Noto Sans SC',sans-serif">

<!-- PERSONAL BILL MODAL -->
<div class="modal-bg" id="modal-bg">

    <button class="modal-close" onclick="closeModal()">取消</button>

</div>

<script>
const SB_URL = 'https://xrleopqmfeebgnltcjew.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhybGVvcHFtZmVlYmdubHRjamV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzMzNzgsImV4cCI6MjA5MzU0OTM3OH0.jQnyfBJ0hdBb5YV8jm1ANwthTie2I6Hk8MqyPzjI01k';
const sb = supabase.createClient(SB_URL, SB_KEY);

const COLORS = ['#f0e040','#ff6b35','#4ade80','#60a5fa','#f472b6','#a78bfa','#fb923c','#34d399'];
const gc = i => COLORS[i % COLORS.length];
const gi = n => n ? n[0].toUpperCase() : '?';

// 金额精度处理：限制两位小数
const round2 = v => Math.round(v * 100) / 100;

let R = { id:null, me:null, host:null, members:[], items:[], ch:null };
const editing = new Set();
let lastMemberCount = 0;
let isRefreshing = false;
let needsRefresh = false;
let _pollTimer = null;
let isMemberChanging = false;
let needsMemberChange = false;

async function safeRefresh() {
  if (isRefreshing) {
    needsRefresh = true;
    return;
  }
  isRefreshing = true;
  needsRefresh = false;
  try {
    const membersResult = await loadMembers();
    // 成员有变化时强制重渲染 items，确保谁吃喝/付款列表显示所有当前成员
    const forceRender = membersResult && membersResult.added !== undefined;
    await loadItems(forceRender);
  } finally {
    isRefreshing = false;
    if (needsRefresh) {
      needsRefresh = false;
      safeRefresh();
    }
  }
}

// 进入房间后开始轮询，每5秒兜底同步一次，确保最终一致
function startPolling() {
  stopPolling();
  _pollTimer = setInterval(() => {
    if (R.id && !isRefreshing) safeRefresh();
  }, 5000);
}
function stopPolling() {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
}

// ── TOAST（防抖，避免叠加）──
let _toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.classList.remove('show'); _toastTimer = null; }, 2200);
}

// ── 自定义确认框 ──
function showConfirm(msg, confirmText = '确定') {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:flex-end';
    overlay.innerHTML = `
      <div style="background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;border-top:1px solid var(--border)">
        <div style="font-size:15px;color:var(--text);margin-bottom:24px;line-height:1.6;font-family:'Noto Sans SC',sans-serif">${msg}</div>
        <div style="display:flex;gap:10px">
          <button id="_confirm_no" class="btn sec" style="flex:1;padding:14px;font-size:15px">取消</button>
          <button id="_confirm_yes" class="btn" style="flex:1;padding:14px;font-size:15px;background:var(--accent2)">${confirmText}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#_confirm_yes').onclick = () => { overlay.remove(); resolve(true); };
    overlay.querySelector('#_confirm_no').onclick = () => { overlay.remove(); resolve(false); };
  });
}

// ── TITLE ──
let lastTitleCount = 2;
function updateTitle() {
  const n = Math.max(2, R.members.length);
  if (n === lastTitleCount) return;
  const el = document.getElementById('main-title');
  // 原地增减 A 节点，不重建整个 innerHTML，避免 sticky header 触发布局抖动
  const current = el.querySelectorAll('.a').length;
  if (n > current) {
    for (let i = current; i < n; i++) {
      const span = document.createElement('span');
      span.className = 'a pop';
      el.insertBefore(span, el.querySelector('.now'));
      span.textContent = 'A';
    }
  } else if (n < current) {
    const spans = el.querySelectorAll('.a');
    for (let i = current - 1; i >= n; i--) spans[i].remove();
  }
  lastTitleCount = n;
}

function loadSession() {

async function rejoin() {

function genCode() { return Math.random().toString(36).slice(2, 8).toUpperCase(); }
function roomFromURL() { return new URLSearchParams(location.search).get('room'); }

// ── CREATE / JOIN ──
async function createRoom() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { toast('请输入你的名字'); return; }
  // 房间码创建失败时自动重试（最多3次）
  for (let attempt = 0; attempt < 3; attempt++) {
    const code = genCode();
    const { error } = await sb.from('rooms').insert({ id: code, host: name });
    if (!error) { await enterRoom(code, name, name); return; }
    if (attempt === 2) { toast('创建失败，请重试'); console.error(error); return; }
  }
}

async function joinRoom() {
  const name = document.getElementById('j-name').value.trim();
  const code = document.getElementById('j-code').value.trim().toUpperCase();
  if (!name) { toast('请输入你的名字'); return; }
  if (code.length !== 6) { toast('请输入6位房间码'); return; }
  const { data } = await sb.from('rooms').select('id,host').eq('id', code).single();
  if (!data) { toast('房间不存在，检查一下码'); return; }
  await enterRoom(code, name, data.host);
}

async function enterRoom(code, name, host) {
  R.id = code; R.me = name; R.host = host;
  const { data: existing } = await sb.from('members').select('id').eq('room_id', code).eq('name', name).single();
  if (!existing) {
    await sb.from('members').insert({ room_id: code, name });
  }
  await loadMembers();
  await loadItems(); // 先拉好数据，再建立 realtime 监听
  setupRT();
  const u = new URL(location.href);
  u.searchParams.set('room', code);
  history.replaceState({}, '', u);
  document.getElementById('rc').textContent = code;
  document.getElementById('ru').textContent = name + (name === host ? ' 👑' : '');
  document.getElementById('clear-btn').style.display = (name === host) ? 'inline-block' : 'none';
  saveSession(code, name);
  lastTitleCount = 2;
  lastMemberCount = R.members.length;
  showPage('pg-room');
  startPolling();
}

// ── LOAD ──
async function loadMembers() {
  const { data } = await sb.from('members').select('name,joined_at').eq('room_id', R.id).order('joined_at');
  const newMembers = data ? data.map(m => m.name) : [];

  // 空房间提示
  if (newMembers.length === 0) {
    toast('房间已空，所有成员已离开');
    setTimeout(() => leaveRoom(), 2000);
    return false;
  }

  const unchanged = JSON.stringify(newMembers) === JSON.stringify(R.members);
  // 用 created_at 时间判断新人，比对比数组更可靠
  const memberData = data || [];
  const added = R.members.length > 0
    ? memberData.filter(m => !R.members.includes(m.name) && m.name !== R.me).map(m => ({ name: m.name, joined_at: m.joined_at }))
    : [];

  R.members = newMembers;

  if (!unchanged) {
    renderMembers();
    updateTitle();
  }

  return unchanged ? { added: [] } : { added };
}

// 成员变化时的统一处理
async function onMembersChanged() {
  if (isMemberChanging) {
    needsMemberChange = true;
    return;
  }
  isMemberChanging = true;
  needsMemberChange = false;
  try {
    const result = await loadMembers();
    if (!result) return;

    const { added } = result;
    if (added.length > 0) {
      const names = added.map(m => m.name || m).join(', ');
      toast(R.me === R.host ? `${names} 已加入房间 👋` : `${names} 加入了房间 👋`);
    }

    if (R.me === R.host) {
      // 直接从数据库拉所有成员时间戳和账单，不依赖 added 数组
      const [{ data: allMembers }, { data: freshItems }] = await Promise.all([
        sb.from('members').select('name,joined_at').eq('room_id', R.id),
        sb.from('items').select('*').eq('room_id', R.id).order('created_at')
      ]);
      if (!allMembers || !freshItems) { await safeRefresh(); return; }

      let anyChanged = false;
      for (const it of freshItems) {
        const missingNames = allMembers.map(m => m.name).filter(n => !it.participants.includes(n));
        if (missingNames.length === 0) continue;

        // 缺失的成员，joined_at 全都晚于账单 created_at，才是全选账单
        const allNew = missingNames.every(name => {
          const m = allMembers.find(x => x.name === name);
          if (!m) return false;
          if (!m.joined_at || !it.created_at) return true;
          return new Date(m.joined_at) > new Date(it.created_at);
        });

        if (!allNew) continue;

        for (const name of missingNames) it.participants.push(name);
        await sb.from('items').update({ participants: it.participants }).eq('id', it.id);
        anyChanged = true;
      }

      if (anyChanged) {
        try { await R.ch.send({ type: 'broadcast', event: 'items_updated', payload: {} }); } catch(e) {}
      }
    }

    await safeRefresh();
  } finally {
    isMemberChanging = false;
    if (needsMemberChange) {
      needsMemberChange = false;
      onMembersChanged();
    }
  }
}

async function loadItems(forceRender = false) {
  const { data } = await sb.from('items').select('*').eq('room_id', R.id).order('created_at');
  if (!data) return;

  const newItems = data.map(remote => {
    if (editing.has(remote.id)) {
      const local = R.items.find(i => i.id === remote.id);
      return local || remote;
    }
    return remote;
  });

  // 数据没有变化且不强制重渲染，跳过
  if (!forceRender && JSON.stringify(newItems) === JSON.stringify(R.items)) return;

  R.items = newItems;

  if (editing.size > 0) return;

  renderItems();

  const rs = document.getElementById('result-sec');
  if (rs && rs.style.display !== 'none' && window._calcData) {
    calculateSilent();
  }
}

// ── REALTIME ──
function setupRT() {
  if (R.ch) sb.removeChannel(R.ch);
  R.ch = sb.channel('r-' + R.id)
    .on('postgres_changes', { event:'*', schema:'public', table:'members', filter:'room_id=eq.'+R.id },
      async () => {
        const { data } = await sb.from('members').select('name').eq('room_id', R.id).eq('name', R.me).single();
        if (!data) return;
        await onMembersChanged();
      })
    .on('postgres_changes', { event:'*', schema:'public', table:'items', filter:'room_id=eq.'+R.id },
      p => {
        const itemId = p.new?.id || p.old?.id;
        if (editing.has(itemId)) return; // 自己正在编辑，跳过
        safeRefresh();
      })
    .on('broadcast', { event: 'kicked' }, ({ payload }) => {
      if (payload.name !== R.me) return;
      if (R.ch) sb.removeChannel(R.ch);
      R = { id:null, me:null, host:null, members:[], items:[], ch:null };
      editing.clear(); lastTitleCount = 2; lastMemberCount = 0;
      const u = new URL(location.href);
      u.searchParams.delete('room');
      history.replaceState({}, '', u);
      showKickedPage(payload.host);
    })
    .on('broadcast', { event: 'host_changed' }, ({ payload }) => {
      R.host = payload.host;
      // 更新顶部用户名显示
      document.getElementById('ru').textContent = R.me + (R.me === R.host ? ' 👑' : '');
      // 新房主显示清空按钮
      document.getElementById('clear-btn').style.display = (R.me === R.host) ? 'inline-block' : 'none';
      // 刷新成员列表（显示新的皇冠）
      renderMembers();
    })
    .on('broadcast', { event: 'items_updated' }, async () => {
      await safeRefresh();
    })
    .subscribe(status => {
      if (status === 'SUBSCRIBED') {
        setConnStatus(true);
        safeRefresh(); // 重连后立刻同步一次
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        setConnStatus(false);
      }
    });
}

function setConnStatus(online) {
  const dot = document.querySelector('.live');
  const bar = document.getElementById('conn-bar');
  if (online) {
    if (dot) { dot.style.background = 'var(--green)'; dot.title = ''; }
    if (bar) bar.style.display = 'none';
  } else {
    if (dot) { dot.style.background = '#ef4444'; dot.title = '连接断开'; }
    if (bar) bar.style.display = 'flex';
  }
}

async function removeMember(name) {
  const isHost = R.me === R.host;
  const isMe = name === R.me;
  if (!isHost && !isMe) return;

  // 自己退出走 leaveRoom
  if (isMe) { leaveRoom(); return; }

  if (!await showConfirm(`确定要移除 "${name}" 吗？`, '确定移除')) return;

  // broadcast 通知被踢的人（在删数据前发，确保对方还在线能收到）
  try { await R.ch.send({ type: 'broadcast', event: 'kicked', payload: { name, host: R.host } }); } catch(e) {}

  // 删除该成员的所有账单
  const theirItemIds = R.items.filter(it => (it.creator || it.payer) === name).map(it => it.id);
  for (const id of theirItemIds) {
    await sb.from('items').delete().eq('id', id);
  }
  R.items = R.items.filter(it => !theirItemIds.includes(it.id));

  // 从剩余账单的 participants/payer 中移除该成员
  for (const it of R.items) {
    let changed = false;
    const idx = it.participants.indexOf(name);
    if (idx >= 0) {
      it.participants.splice(idx, 1);
      if (it.participants.length === 0) it.participants = R.members.filter(m => m !== name).slice(0, 1);
      changed = true;
    }
    if (it.payer === name) { it.payer = 'each'; changed = true; }
    if (changed) await sb.from('items').update({ participants: it.participants, payer: it.payer }).eq('id', it.id);
  }

  // 删除成员
  await sb.from('members').delete().eq('room_id', R.id).eq('name', name);
  R.members = R.members.filter(m => m !== name);

  // 所有写操作完成，broadcast 通知其他人全量刷新
  try { await R.ch.send({ type: 'broadcast', event: 'items_updated', payload: {} }); } catch(e) {}

  // 房主本地精准更新 DOM，不全量重建
  theirItemIds.forEach(id => {
    const el = document.querySelector(`[data-ic="${id}"]`);
    if (el) el.remove();
  });
  R.items.forEach(it => updateItemCard(it));
  updateItemBadge();
  if (!R.items.length) document.getElementById('items-list').innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div>还没人记账</div>`;
  renderMembers();
  updateTitle();
  toast(`已移除 ${name}`);
}

// ── RENDER MEMBERS ──
function renderMembers() {
  const isHost = R.me === R.host;
  const newHtml = R.members.map((m, i) => {
    const canRemove = isHost || m === R.me;
    const isH = m === R.host;
    return `<div class="chip ${m===R.me?'me':''} ${isH&&m!==R.me?'hostchip':''}">
      <div class="av" style="background:${gc(i)}22;color:${gc(i)}">${gi(m)}</div>
      <span>${m}${m===R.me?' (我)':''}${isH?' 👑':''}</span>
      ${canRemove ? `<button class="chip-rm" onclick="removeMember('${m}')">×</button>` : ''}
    </div>`;
  }).join('');
  const chips = document.getElementById('m-chips');
  if (chips.innerHTML !== newHtml) chips.innerHTML = newHtml;
  const b = document.getElementById('m-badge');
  const badgeHtml = R.members.length ? `<span class="badge">${R.members.length}</span>` : '';

          value="${it.name||''}"
          ${isMine ? `onfocus="onFocus('${it.id}')" oninput="onNameIn('${it.id}',this.value)" onblur="onNameBlur('${it.id}')"` : 'readonly'}

      </div>

function renderItems() {
  if (editing.size > 0) return; // 有人在输入，不重建 DOM
  const el = document.getElementById('items-list');
  updateItemBadge();
  if (!R.items.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div>还没人记账</div>`; return; }
  const scrollY = window.scrollY;
  el.innerHTML = R.items.map(it => buildItemHTML(it)).join('');
  requestAnimationFrame(() => window.scrollTo({ top: scrollY, behavior: 'instant' }));
}
function appendItemCard(it) {
  const el = document.getElementById('items-list');
  const empty = el.querySelector('.empty');
  if (empty) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend', buildItemHTML(it));
}
function updateItemCard(it) {
  const card = document.querySelector(`[data-ic="${it.id}"]`);
  if (!card) return;

  // 更新付款人文字
  const whoEl = card.querySelector('.ic-who b');
  if (whoEl) whoEl.textContent = it.payer === 'each' ? '大家' : it.payer;

  // 更新菜名（只读输入框，不在编辑中才更新）
  if (!editing.has(it.id)) {
    const nameInput = card.querySelector('.ic-row input:first-of-type');
    if (nameInput && nameInput.value !== (it.name || '')) nameInput.value = it.name || '';

    // 更新价格
    const priceInput = card.querySelector('.pw input');
    if (priceInput && priceInput.value !== String(it.price || '')) priceInput.value = it.price || '';
  }

  // 更新参与者 pills（原地重建这一小块）
  const eatEl = card.querySelector(`[data-eat="${it.id}"]`);
  if (eatEl) reRenderEatersEl(it, eatEl);

  // 更新付款人 pills
  const payEl = card.querySelector(`[data-pay="${it.id}"]`);
  if (payEl) reRenderPayersEl(it, payEl);
}

// 原地重建参与者 pills（不动整张卡）
function reRenderEatersEl(it, el) {
  const creator = it.creator || it.payer;
  const isMine = creator === R.me;
  const newHtml = R.members.map(p =>
    `<div class="pe${it.participants.includes(p)?' on':''} ${!isMine?'ro':''}"
      ${isMine?`onclick="toggleEater('${it.id}','${p}')"`:''}><div class="d"></div>${p}</div>`).join('');
  if (el.innerHTML !== newHtml) el.innerHTML = newHtml;
}

// 原地重建付款人 pills（不动整张卡）
function reRenderPayersEl(it, el) {
  // 只显示当前仍在房间的成员，过滤已删除的人
  const validMembers = R.members;
  const newHtml = `<div class="pp${it.payer==='each'?' on':''}" onclick="selPayer('${it.id}','each')"><div class="d"></div>各自付</div>` +
    validMembers.map(p => `<div class="pp${it.payer===p?' on':''}" onclick="selPayer('${it.id}','${p}')"><div class="d"></div>${p}</div>`).join('');
  if (el.innerHTML !== newHtml) el.innerHTML = newHtml;
}
function updateItemBadge() {
  const b = document.getElementById('i-badge');
  b.innerHTML = R.items.length ? `<span class="badge">${R.items.length}</span>` : '';
}

// ── ADD ITEM ──
async function addItem() {
  const members = R.members.length > 0 ? R.members : [R.me];
  const { data, error } = await sb.from('items').insert({
    room_id: R.id, name: '', price: 0,
    payer: R.me, creator: R.me,
    participants: members
  }).select().single();
  if (error) { toast('添加失败，请重试'); return; }
  if (!R.items.find(i => i.id === data.id)) {
    R.items.push(data);
    appendItemCard(data);
    updateItemBadge();
  }
  setTimeout(() => {
    const inputs = document.querySelectorAll('[data-ic] input');
    if (inputs.length >= 2) inputs[inputs.length - 2].focus();
  }, 60);
}

async function deleteItem(id) {
  const it = R.items.find(i => i.id === id);
  if (!it) return;
  const isMine = it.creator === R.me || it.payer === R.me;
  const isHost = R.me === R.host;
  if (!isMine && !isHost) { toast('只有创建者或房主可以删除'); return; }
  editing.delete(id);
  R.items = R.items.filter(i => i.id !== id);
  const el = document.querySelector(`[data-ic="${id}"]`);
  if (el) el.remove();
  updateItemBadge();
  if (!R.items.length) document.getElementById('items-list').innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div>还没人记账</div>`;
  await sb.from('items').delete().eq('id', id);
  // 通知其他人立刻刷新
  try { await R.ch.send({ type: 'broadcast', event: 'items_updated', payload: {} }); } catch(e) {}
}

// 【修复】金额输入校验：只允许数字和一个小数点，禁止负数
function onPriceIn(id, v) {
  const it = R.items.find(i => i.id === id);
  if (!it) return;
  // 过滤非法字符，只保留数字和第一个小数点
  let cleaned = v.replace(/[^\d.]/g, '');
  // 只保留第一个小数点
  const dotIdx = cleaned.indexOf('.');
  if (dotIdx !== -1) {
    cleaned = cleaned.slice(0, dotIdx + 1) + cleaned.slice(dotIdx + 1).replace(/\./g, '');
  }
  // 限制小数点后最多两位
  if (dotIdx !== -1) {
    const parts = cleaned.split('.');
    if (parts[1] && parts[1].length > 2) {
      parts[1] = parts[1].slice(0, 2);
      cleaned = parts.join('.');
    }
  }
  it.price = cleaned;
  // 同步更新输入框显示
  const input = document.querySelector(`[data-ic="${id}"] .pw input`);
  if (input) input.value = cleaned;
}

// ── CALCULATE ──
function calculate() {
  const valid = R.items.filter(it => it.name && parseFloat(it.price) > 0);
  const incomplete = R.items.filter(it => (it.name && !parseFloat(it.price)) || (!it.name && parseFloat(it.price) > 0));

  if (!valid.length) { toast('还没有填好的账单'); return; }

  // 如果有自己创建的未填完账单，阻止结算并滚动高亮提示
  const myIncomplete = incomplete.filter(it => (it.creator || it.payer) === R.me);
  if (myIncomplete.length > 0) {
    const firstId = myIncomplete[0].id;
    const card = document.querySelector(`[data-ic="${firstId}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.transition = 'border-color .2s';
      card.style.borderColor = 'var(--accent2)';
      card.style.boxShadow = '0 0 0 3px rgba(255,107,53,.25)';
      setTimeout(() => {
        card.style.borderColor = '';
        card.style.boxShadow = '';
      }, 2500);
    }
    toast(`请先填完你的「${myIncomplete[0].name || '账单'}」再结算`);
    return;
  }

  // 非本人创建的未填完账单，toast 提示跳过
  if (incomplete.length) toast(`有 ${incomplete.length} 笔账单未填完，已跳过`);
  runCalculate(valid, true, 'all');
}

let _currentTab = 'all'; // 记录当前结算 tab

// 静默重算（数据变化时自动触发，保持当前 tab，不打扰用户）
function calculateSilent() {
  const valid = R.items.filter(it => it.name && parseFloat(it.price) > 0);
  if (!valid.length) {
    document.getElementById('result-sec').style.display = 'none';
    return;
  }
  runCalculate(valid, false, _currentTab);
}

function runCalculate(valid, scrollToResult, activeTab = 'all') {
  window._calcSnapshot = { items: JSON.stringify(R.items), members: JSON.stringify(R.members) };
  let net = {}, shares = {}, bd = {};
  R.members.forEach(p => { net[p]=0; shares[p]=0; bd[p]=[]; });
  let total = 0;
  valid.forEach(it => {
    const price = parseFloat(it.price);
    const ps = it.participants.filter(p => R.members.includes(p));
    const eaters = ps.length > 0 ? ps : R.members;
    const share = round2(price / eaters.length);
    total += price;
    eaters.forEach(p => { net[p] -= share; shares[p] += share; bd[p].push({ name:it.name, amt:share }); });
    if (it.payer === 'each') { eaters.forEach(p => net[p] += share); }
    else if (R.members.includes(it.payer)) { net[it.payer] += price; }
  });
  let deb = R.members.filter(p => net[p] < -0.005).map(p => ({ name:p, amt:-net[p] }));
  let cred = R.members.filter(p => net[p] > 0.005).map(p => ({ name:p, amt:net[p] }));
  deb.sort((a,b) => b.amt-a.amt); cred.sort((a,b) => b.amt-a.amt);
  let tr = [], di = 0, ci = 0;
  while (di < deb.length && ci < cred.length) {
    const d = deb[di], c = cred[ci], amt = round2(Math.min(d.amt, c.amt));
    tr.push({ from:d.name, to:c.name, amount:amt });
    d.amt -= amt; c.amt -= amt;
    if (d.amt < 0.005) di++; if (c.amt < 0.005) ci++;
  }
  window._calcData = { shares, bd, tr, total, valid, net };
  const rs = document.getElementById('result-sec');
  rs.style.display = 'block';
  renderResultTabs(activeTab);
  if (scrollToResult) setTimeout(() => rs.scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}

function fallbackCopy(text) {

  ta.select();

async function leaveRoom() {
  if (!R.id || !R.me) return;

  // 自动删除自己添加的所有账单
  const myItems = R.items.filter(it => (it.creator || it.payer) === R.me);
  for (const it of myItems) {
    await sb.from('items').delete().eq('id', it.id);
  }

  // 从所有剩余账单的 participants/payer 中移除自己
  const remaining = R.items.filter(it => (it.creator || it.payer) !== R.me);
  for (const it of remaining) {
    let changed = false;
    const idx = it.participants.indexOf(R.me);
    if (idx >= 0) {
      it.participants.splice(idx, 1);
      if (it.participants.length === 0) it.participants = R.members.filter(m => m !== R.me).slice(0, 1);
      changed = true;
    }
    if (it.payer === R.me) { it.payer = 'each'; changed = true; }
    if (changed) await sb.from('items').update({ participants: it.participants, payer: it.payer }).eq('id', it.id);
  }

  // 先删自己的 member 记录
  await sb.from('members').delete().eq('room_id', R.id).eq('name', R.me);

  // 如果我是房主，按付款次数最多的人转让
  if (R.me === R.host) {
    const others = R.members.filter(m => m !== R.me);
    if (others.length > 0) {
      // 统计每人在剩余账单里作为 payer 的次数
      const payCount = {};
      others.forEach(m => { payCount[m] = 0; });
      R.items.forEach(it => {
        if (it.payer && it.payer !== 'each' && payCount[it.payer] !== undefined) {
          payCount[it.payer]++;
        }
      });
      const newHost = others.reduce((a, b) => payCount[a] >= payCount[b] ? a : b);
      try {
        await sb.from('rooms').update({ host: newHost }).eq('id', R.id);
        // 广播新房主，让所有人更新 UI
        await R.ch.send({ type: 'broadcast', event: 'host_changed', payload: { host: newHost } });
      } catch(e) {}
    }
  }

  // 广播账单变化，让其他人刷新
  try { await R.ch.send({ type: 'broadcast', event: 'items_updated', payload: {} }); } catch(e) {}

  if (R.ch) sb.removeChannel(R.ch);
  stopPolling();
  R = { id:null, me:null, host:null, members:[], items:[], ch:null };
  editing.clear(); lastTitleCount = 2; lastMemberCount = 0;
  document.getElementById('main-title').innerHTML = '<span class="a">A</span><span class="a">A</span><span class="now">now</span>';
  const u = new URL(location.href);
  u.searchParams.delete('room');
  history.replaceState({}, '', u);
  document.getElementById('result-sec').style.display = 'none';
  _currentTab = 'all';
  showPage('pg-land');
  showSessionBanner();
}

async function saveShot() {
  const shot = document.querySelector('.shot');
  if (!shot) return;
  const btn = document.querySelector('.shot-save-btn');
  btn.textContent = '生成中…';
  btn.disabled = true;
  // 截图前隐藏按钮，避免被截进图片（用 display 而非 visibility，避免留白）
  btn.style.display = 'none';
  try {
    const canvas = await html2canvas(shot, {
      backgroundColor: '#111',
      scale: 2,
      useCORS: true,
    });
    btn.style.display = '';
    canvas.toBlob(async blob => {
      if (!blob) { toast('生成失败，请重试'); resetSaveBtn(btn); return; }
      const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
      const roomCode = (R.id || 'room');
      const filename = `AAnow-${roomCode}-${dateStr}.png`;

      // 优先 Web Share API（手机端直接调用系统分享）
      if (navigator.canShare && blob.size < 50 * 1024 * 1024) {
        try {
          const file = new File([blob], filename, { type: 'image/png' });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'AAnow 结算结果' });
            toast('已分享 📸');
            resetSaveBtn(btn);
            return;
          }
        } catch(e) {
          if (e.name !== 'AbortError') { /* 用户取消，继续 fallback */ }
        }
      }
      // fallback：桌面下载 / iOS 新标签页打开（用户可长按保存）
      fallbackSave(blob, filename, btn);
    }, 'image/png');
  } catch(e) {
    btn.style.display = '';
    toast('生成失败，请重试');
    resetSaveBtn(btn);
  }
}

function resetSaveBtn(btn) {
  btn.textContent = '保存图片';
  btn.disabled = false;
  btn.style.display = '';
}

function fallbackSave(blob, filename, btn) {
  const url = URL.createObjectURL(blob);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    // iOS：新标签页打开图片，用户长按可保存/分享
    const w = window.open();
    if (w) {
      const img = new Image();
      img.src = url;
      img.style.maxWidth = '100%';
      w.document.body.style.background = '#111';
      w.document.body.style.margin = '0';
      w.document.body.appendChild(img);
      w.document.title = filename;
      toast('已打开图片，长按可保存或分享');
    } else {
      toast('请允许弹出窗口，或尝试其他浏览器');
    }
  } else {
    // 桌面/Android：直接下载
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast('图片已保存 📸');
  }
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  resetSaveBtn(btn);
}

// ── INIT ──
window.addEventListener('load', () => {
  const code = roomFromURL();
  const { name } = loadSession();
  if (code) {
    document.getElementById('j-code').value = code;
    if (name) document.getElementById('j-name').value = name;
    document.getElementById('j-name').focus();
    toast('输入名字加入房间 👋');
  }
  showSessionBanner();
  document.getElementById('manual-inp').addEventListener('keydown', e => { if (e.key==='Enter') addManual(); });
  document.getElementById('j-name').addEventListener('keydown', e => { if (e.key==='Enter') joinRoom(); });
  document.getElementById('c-name').addEventListener('keydown', e => { if (e.key==='Enter') createRoom(); });

  // 输入框获焦时平滑滚动到可视区域（移动端键盘遮挡处理）
  document.addEventListener('focusin', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
      setTimeout(() => e.target.scrollIntoView({ behavior:'smooth', block:'center' }), 350);
    }
  });
});
</script>
